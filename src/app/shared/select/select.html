<div class="w-full">
  @if (label) {
  <label [for]="selectId" class="block mb-2 text-foreground">
    {{ label }}
  </label>
  }

  <select [id]="selectId" [name]="name || selectId" title="Select field" [attr.title]="title" [ngClass]="selectClasses"
    [value]="value" [disabled]="disabled" [required]="required" [attr.aria-invalid]="currentError ? 'true' : 'false'"
    [attr.aria-describedby]="currentError ? selectId + '-error' : null" (change)="onChange($event)" (blur)="onBlur()">
    @for (option of options; track option.value) {
    <option [value]="option.value">
      {{ option.label }}
    </option>
    }
  </select>

  @if (currentError) {
  <p [id]="selectId + '-error'" class="mt-1 text-sm text-[#E53E3E]" role="alert">
    {{ currentError }}
  </p>
  }
</div>
