<div class="min-h-screen flex flex-col bg-gray-50">
  <header
    class="bg-gradient-to-r from-gray-900 to-gray-800 text-white h-16 flex items-center px-4 md:px-6 sticky top-0 z-50 shadow-lg">
    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-4">
        <button type="button" (click)="toggleSidebar()"
          class="md:hidden p-2 hover:bg-white/10 rounded-xl transition-all" aria-label="Abrir menu"
          [attr.aria-expanded]="sidebarOpen()">
          <lucide-icon [img]="sidebarOpen() ? iconX : iconMenu" [size]="24"></lucide-icon>
        </button>
        <div class="flex items-center gap-3">
          <div class="p-2 bg-white/10 rounded-xl backdrop-blur-sm">
            <lucide-icon [img]="iconBookOpen" [size]="28" aria-hidden="true"></lucide-icon>
          </div>
          <h1 class="text-xl font-extrabold text-white">SGB</h1>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="hidden sm:block text-right">
          <p class="text-sm font-semibold text-white">{{ user()?.name }}</p>
          <p class="text-xs text-white">{{ getUserRoleLabel(user()?.role) }}</p>
        </div>
        <app-button variant="ghost" size="sm" className="text-white hover:bg-white/10 shadow-none"
          title="Sair do sistema" aria-label="Sair do sistema" (click)="handleLogout()">
          <lucide-icon [img]="iconLogOut" [size]="20"></lucide-icon>
          <span class="hidden sm:inline">Sair</span>
        </app-button>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <aside
      class="fixed md:static inset-y-0 left-0 z-40 w-64 bg-white transform transition-transform duration-300 ease-in-out mt-16 md:mt-0 border-r border-gray-200 shadow-xl md:shadow-none"
      [ngClass]="sidebarTransformClass" aria-label="Menu de navegação">
      <nav class="p-4 space-y-2">
        <a *ngFor="let item of filteredMenuItems(); trackBy: trackByPath" [routerLink]="item.path"
          (click)="closeSidebar()" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200"
          [ngClass]="
            isActivePath(item.path)
              ? 'bg-gradient-to-r from-gray-900 to-gray-800 text-white font-semibold shadow-md'
              : 'text-gray-700 hover:bg-gray-100 hover:text-gray-900'
          " [attr.aria-current]="isActivePath(item.path) ? 'page' : null">
          <lucide-icon [img]="item.icon" [size]="20" aria-hidden="true"></lucide-icon>
          <span>{{ item.label }}</span>
        </a>
      </nav>
    </aside>

    <div *ngIf="sidebarOpen()" class="fixed inset-0 bg-black/50 z-30 md:hidden mt-16" (click)="toggleSidebar()"
      aria-hidden="true"></div>

    <main class="flex-1 overflow-auto p-4 md:p-6 lg:p-8">
      <div class="max-w-7xl mx-auto">
        <ng-content></ng-content>
      </div>
    </main>
  </div>
</div>

<!-- React-only original: Link do react-router virou [routerLink] no template Angular -->
<!-- React-only original: {children} virou <ng-content></ng-content> -->
<!-- React-only original: className template literal foi migrado para class + [ngClass] -->
